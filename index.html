<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BFHL Node Validator</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .hint {
            color: #999;
            font-size: 12px;
            margin-top: 6px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #c33;
        }

        .response-section {
            margin-top: 30px;
        }

        .response-title {
            color: #333;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .response-box {
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 400px;
            overflow-y: auto;
        }

        .success {
            color: #27ae60;
        }

        .loading {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [input, setInput] = useState('');
            const [response, setResponse] = useState(null);
            const [error, setError] = useState(null);
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError(null);
                setResponse(null);
                setLoading(true);

                try {
                    // Parse input - expecting comma-separated or newline-separated values
                    const nodeArray = input
                        .split(/[\n,]/)
                        .map(item => item.trim())
                        .filter(item => item.length > 0);

                    if (nodeArray.length === 0) {
                        setError('Please enter at least one node (e.g., A->B)');
                        setLoading(false);
                        return;
                    }

                    const apiUrl = process.env.API_URL || 'http://localhost:8000';
                    const res = await fetch(`${apiUrl}/bfhl`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ data: nodeArray }),
                    });

                    if (!res.ok) {
                        throw new Error(`HTTP error! status: ${res.status}`);
                    }

                    const data = await res.json();
                    setResponse(data);
                } catch (err) {
                    setError(
                        err.message || 'Failed to connect to API. Make sure the server is running at http://localhost:8000'
                    );
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="container">
                    <h1>BFHL Node Validator</h1>
                    <p className="subtitle">Validate and process node relationships</p>

                    <form onSubmit={handleSubmit}>
                        <div className="form-group">
                            <label htmlFor="nodes">Enter Node List</label>
                            <textarea
                                id="nodes"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                placeholder="Enter nodes (one per line or comma-separated)&#10;Example:&#10;A->B&#10;B->C&#10;C->D"
                                disabled={loading}
                            />
                            <div className="hint">
                                Format: X-&gt;Y (e.g., A-&gt;B, B-&gt;C). Separate by newlines or commas.
                            </div>
                        </div>

                        <button type="submit" disabled={loading}>
                            {loading ? (
                                <>
                                    <span className="loading">⏳</span> Processing...
                                </>
                            ) : (
                                'Submit'
                            )}
                        </button>
                    </form>

                    {error && <div className="error">{error}</div>}

                    {response && (
                        <div className="response-section">
                            <div className="response-title">✓ Response</div>
                            <div className="response-box">
                                <pre>{JSON.stringify(response, null, 2)}</pre>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
